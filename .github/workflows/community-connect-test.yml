name: Community Connect Tests

on:
  push:
    paths:
      - "community-connect/**"
  pull_request:
    paths:
      - "community-connect/**"

defaults:
  run:
    working-directory: community-connect

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: community-connect/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Coverage (optional)
        run: npm run test:coverage
        continue-on-error: true
