apiVersion: apps/v1
kind: Deployment
metadata:
  name: cad-dispatch-service
  labels:
    app: cad-dispatch-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cad-dispatch-service
  template:
    metadata:
      labels:
        app: cad-dispatch-service
    spec:
      containers:
        - name: cad-dispatch-service
          image: bluecore/cad-dispatch-service:latest
          ports:
            - containerPort: 8070
          env:
            - name: CAD_DB_URL
              valueFrom:
                secretKeyRef:
                  name: bluecore-db
                  key: cad-db-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: bluecore-config
                  key: redis-url
            - name: WEBSOCKET_GATEWAY_URL
              value: "http://websocket-gateway:8061"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8070
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8070
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cad-dispatch-service
spec:
  selector:
    app: cad-dispatch-service
  ports:
    - port: 8070
      targetPort: 8070
