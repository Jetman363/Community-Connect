services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: bluecore
      POSTGRES_PASSWORD: bluecore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  kafka:
    image: apache/kafka:3.8.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  gateway:
    build:
      context: ../../
      dockerfile: deployments/docker/gateway.Dockerfile
    env_file: ../../.env
    environment:
      ALERT_ENGINE_URL: http://alert-engine:8060
      WEBSOCKET_GATEWAY_URL: http://websocket-gateway:8061
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - rms-service
      - ai-report-service
      - alert-engine
      - websocket-gateway
      - cad-dispatch-service
      - call-parser-service

  auth:
    build:
      context: ../../
      dockerfile: deployments/docker/auth.Dockerfile
    env_file: ../../.env
    environment:
      EVENT_BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  rms-service:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r /requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8010"
    volumes:
      - ../../services/rms-service/app:/app/app
      - ../../services/rms-service/requirements.txt:/requirements.txt
      - ../../shared/python/shared_lib:/shared/shared_lib
    environment:
      PYTHONPATH: /app:/shared
      EVENT_BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8010"

  ai-report-service:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn pydantic redis && uvicorn main:app --host 0.0.0.0 --port 8020"
    volumes:
      - ../../ai-engine/report-assistant/app:/app
      - ../../shared/python/shared_lib:/shared/shared_lib
    environment:
      PYTHONPATH: /shared
      EVENT_BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8020:8020"

  audit-service:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn pydantic && uvicorn main:app --host 0.0.0.0 --port 8030"
    volumes:
      - ../../services/audit-service/app:/app
    ports:
      - "8030:8030"

  outbox-relay:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install httpx redis prometheus-client && python main.py"
    volumes:
      - ../../services/outbox-relay/app:/app
    environment:
      AUTH_SERVICE_URL: http://auth:8001
      RMS_SERVICE_URL: http://rms-service:8010
      REDIS_URL: redis://redis:6379/0
      EVENT_BUS_TOPIC_PREFIX: bluecore
      OUTBOX_RELAY_POLL_SECONDS: 5
      OUTBOX_RELAY_MAX_RETRIES: 5
      OUTBOX_RELAY_METRICS_PORT: 9110
      OUTBOX_RELAY_CIRCUIT_OPEN_SECONDS: 30
    depends_on:
      - auth
      - rms-service
      - redis

  integration-service:
    build:
      context: ../../
      dockerfile: deployments/docker/integration.Dockerfile
    env_file: ../../.env
    environment:
      INTEGRATION_DB_URL: postgresql+asyncpg://bluecore:bluecore@postgres:5432/integration_db
      REDIS_URL: redis://redis:6379/0
      EVENT_STREAM_PREFIX: bluecore.integrations
      EVENT_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: integration-service
      KAFKA_AUTO_CREATE_TOPICS: "true"
      WEBHOOK_BASE_URL: http://localhost:8050
      POLL_WORKER_ENABLED: "true"
      ALERT_BRIDGE_ENABLED: "true"
      ALERT_ENGINE_URL: http://alert-engine:8060
      KAFKA_ALERT_INGRESS_TOPIC: bluecore.alerts.ingress
      ALERT_BRIDGE_SECRET: dev-bridge-secret-change-me
    ports:
      - "8050:8050"
    depends_on:
      - postgres
      - redis
      - kafka

  alert-engine:
    build:
      context: ../../
      dockerfile: deployments/docker/alert-engine.Dockerfile
    env_file: ../../.env
    environment:
      ALERT_DB_URL: postgresql+asyncpg://bluecore:bluecore@postgres:5432/alert_db
      REDIS_URL: redis://redis:6379/1
      EVENT_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: alert-engine
      KAFKA_INGRESS_TOPIC: bluecore.alerts.ingress
      KAFKA_PROCESSED_TOPIC: bluecore.alerts.processed
      KAFKA_AUTO_CREATE_TOPICS: "true"
      EVENT_STREAM_PREFIX: bluecore.alerts
      WEBSOCKET_GATEWAY_URL: http://websocket-gateway:8061
      CONSUMER_WORKER_ENABLED: "true"
      POLL_WORKER_ENABLED: "false"
      INTEGRATION_BRIDGE_ENABLED: "true"
      ALERT_BRIDGE_SECRET: dev-bridge-secret-change-me
    ports:
      - "8060:8060"
    depends_on:
      - postgres
      - redis
      - kafka

  websocket-gateway:
    build:
      context: ../../
      dockerfile: deployments/docker/websocket-gateway.Dockerfile
    env_file: ../../.env
    environment:
      REDIS_URL: redis://redis:6379/1
      EVENT_STREAM_PREFIX: bluecore.alerts
      CAD_STREAM_PREFIX: bluecore.cad
      ALLOW_DEMO_WS: "true"
    ports:
      - "8061:8061"
    depends_on:
      - redis

  event-consumer:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install redis prometheus-client && python main.py"
    volumes:
      - ../../services/event-consumer/app:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      EVENT_BUS_TOPIC_PREFIX: bluecore
      EVENT_CONSUMER_GROUP: ops-analytics
      EVENT_CONSUMER_NAME: consumer-1
      EVENT_CONSUMER_METRICS_PORT: 9111
    depends_on:
      - redis

  cad-dispatch-service:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r /requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8070 --reload"
    volumes:
      - ../../services/cad-dispatch-service/app:/app/app
      - ../../services/cad-dispatch-service/requirements.txt:/requirements.txt
    environment:
      CAD_DB_URL: postgresql+asyncpg://bluecore:bluecore@postgres:5432/cad_db
      REDIS_URL: redis://redis:6379/2
      EVENT_STREAM_PREFIX: bluecore.cad
      WEBSOCKET_GATEWAY_URL: http://websocket-gateway:8061
    ports:
      - "8070:8070"
    depends_on:
      - postgres
      - redis

  call-parser-service:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r /requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8080"
    volumes:
      - ../../ai-engine/call-parser/app:/app/app
      - ../../ai-engine/call-parser/requirements.txt:/requirements.txt
    ports:
      - "8080:8080"

  demo-orchestrator:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r /requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8090 --reload"
    volumes:
      - ../../services/demo-orchestrator/app:/app/app
      - ../../services/demo-orchestrator/requirements.txt:/requirements.txt
    environment:
      CAD_DISPATCH_URL: http://cad-dispatch-service:8070/v1
      WEBSOCKET_GATEWAY_URL: http://websocket-gateway:8061
      REDIS_URL: redis://redis:6379/3
      AGENCY_ID: agency-demo-001
      DEMO_MODE_ENABLED: "true"
    ports:
      - "8090:8090"
    depends_on:
      - cad-dispatch-service
      - redis
      - websocket-gateway

volumes:
  pgdata:
