name: Deploy Community Connect (Staging)

on:
  workflow_dispatch:
  push:
    branches: [staging]
    paths:
      - "community-connect/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: community-connect
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

