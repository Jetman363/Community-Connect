name: Deploy Community Connect (Production)

on:
  workflow_dispatch:
  push:
    tags:
      - "community-connect-v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: community-connect
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Security audit
        run: npm audit --audit-level=high || true

