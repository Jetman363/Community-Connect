apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-service
  labels:
    app: integration-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: integration-service
  template:
    metadata:
      labels:
        app: integration-service
    spec:
      containers:
        - name: integration-service
          image: bluecore/integration:latest
          ports:
            - containerPort: 8050
          env:
            - name: INTEGRATION_DB_URL
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: db-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: jwt-secret
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: encryption-key
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: EVENT_STREAM_PREFIX
              value: bluecore.integrations
            - name: EVENT_BACKEND
              value: kafka
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: KAFKA_CLIENT_ID
              value: integration-service
            - name: KAFKA_AUTO_CREATE_TOPICS
              value: "true"
            - name: WEBHOOK_BASE_URL
              value: http://integration-service:8050
            - name: POLL_WORKER_ENABLED
              value: "true"
            - name: EVENT_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: integration-secrets
                  key: event-signing-secret
            - name: RUN_ALEMBIC_ON_STARTUP
              value: "false"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8050
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8050
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: integration-service
spec:
  selector:
    app: integration-service
  ports:
    - port: 8050
      targetPort: 8050
      name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: integration-secrets
type: Opaque
stringData:
  db-url: postgresql+asyncpg://bluecore:bluecore@postgres:5432/integration_db
  jwt-secret: replace-with-secure-secret
  encryption-key: replace-with-32-byte-encryption-key!!
  event-signing-secret: replace-with-strong-signing-secret
