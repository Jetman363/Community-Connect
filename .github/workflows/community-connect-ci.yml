name: Community Connect CI

on:
  push:
    paths:
      - "community-connect/**"
      - ".github/workflows/community-connect-ci.yml"
  pull_request:
    paths:
      - "community-connect/**"
      - ".github/workflows/community-connect-ci.yml"

defaults:
  run:
    working-directory: community-connect

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: community-connect/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_SECRET: ci-jwt-secret-minimum-16-chars

      - name: Security audit (placeholder)
        run: npm audit --audit-level=high || true

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: community-connect/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
